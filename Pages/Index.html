<!DOCTYPE html>
<html lang="en">
    <head>
        <!--Setup for responsiveness and encoding-->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FindDit</title>
        <!--Link to CSS-->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <!--=======Navigation Bar=======-->
        <header class="navbar">
            <!--Logo/Brand-->
            <h1>FindDit</h1>

            <!--Navigation Links-->
        <nav>
            <a href="#">About</a>
            <a href="#">Provide Services</a>
        </nav>

        <!--Search input-->
        <input type="text" placeholder="Search for services...">
        </header>

    <!--======Location Section=======-->
    <section class="location">
        <!--Shows user-relevant services based on location-->
        <h2>Services Near You</h2>
    </section>

    <!--===Category Filter===-->
    <section class="categories">
        <!--Filter services by category-->
        <h2>Browse by Category</h2>
        <div class="category-list">
            <button>Plumbing</button>
            <button>Electrical</button>
            <button>Cleaning</button>
            <button>Landscaping</button>
            <button>Painting</button>
        </div>
    </section>

    <!--=======Featured Services=======-->
    <section class="services">

        <!--Service Card 1-->
        <div class="card">
            <h3>Plumber - Sibusiso</h3>

            <!--Trust Indicators-->
            <p>&#11088; 4.8 (120 reviews) | &#x2705; Verified Service Provider</p>
            <p>&#128205; 3km away</p>

            <!--Navigation to service page-->
            <a href="service.html">
                <button>View</button>
            </a>
        </div>

        <!--Service Card 2-->
        <div class="card">
            <h3>Electrician - Kabelo</h3>
            <p>&#11088; 4.7 (95 reviews) | &#x2705; Verified Service Provider</p>
            <p>&#128205; 5km away</p>

            <a href="service.html">
                <button>View</button>
            </a>
        </div>

        </section>

        <!--=========Scout Chatbot=========-->
        <section class="chatbot">
            <!--Input for user query-->
            <input id="scout-input" placeholder="Ask Scout for help...">

            <!-- Button triggers chatbot logic -->
             <button onclick="scoutHelp()">Ask Scout</button>
        </section>

        <!-- Link to JavaScript --> 
        <script src="js/app.js"></script>
    </body>
</html>
